<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5ff"/>
      <stop offset="50%" style="stop-color:#ff00aa"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#8b00ff;stop-opacity:0.8"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- 外枠リング -->
  <rect width="512" height="512" rx="80" fill="none" stroke="url(#ring)" stroke-width="8" opacity="0.6"/>

  <!-- 内側デコ -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.3"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#glow)" stroke-width="1" opacity="0.2"/>

  <!-- C 文字 — メイン -->
  <text
    x="256" y="310"
    text-anchor="middle"
    font-family="Arial Black, Helvetica Neue, sans-serif"
    font-size="220"
    font-weight="900"
    fill="url(#glow)"
    opacity="0.95"
  >C</text>

  <!-- CRUSHA テキスト -->
  <text
    x="256" y="390"
    text-anchor="middle"
    font-family="Arial, sans-serif"
    font-size="38"
    font-weight="700"
    fill="#00f5ff"
    letter-spacing="12"
    opacity="0.9"
  >CRUSHA</text>

  <!-- STUDIO テキスト -->
  <text
    x="256" y="430"
    text-anchor="middle"
    font-family="Arial, sans-serif"
    font-size="22"
    font-weight="400"
    fill="rgba(255,255,255,0.4)"
    letter-spacing="8"
  >STUDIO</text>

  <!-- 星デコ -->
  <circle cx="80" cy="80" r="4" fill="#00f5ff" opacity="0.7"/>
  <circle cx="432" cy="80" r="3" fill="#ff00aa" opacity="0.7"/>
  <circle cx="80" cy="432" r="3" fill="#ffd700" opacity="0.6"/>
  <circle cx="432" cy="432" r="4" fill="#8b00ff" opacity="0.7"/>
  <circle cx="256" cy="60" r="2" fill="#00f5ff" opacity="0.5"/>
  <circle cx="256" cy="452" r="2" fill="#ff00aa" opacity="0.5"/>
</svg>
